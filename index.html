    <!-- JSON-LD structured data -->

      "@context": "https://schema.org",

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" />

    <style>body { visibility: hidden; }</style>
    <script>
      (function () {
        // Restore path after GitHub Pages 404 redirect
        var redirect = sessionStorage.getItem('syskit-redirect');
        if (redirect) {
          sessionStorage.removeItem('syskit-redirect');
          history.replaceState(null, null, redirect);
        }

        // Apply theme before paint to avoid flash
        var saved = localStorage.getItem('syskit-theme') || 'system';
        var t = saved === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : saved;
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.setProperty('--visibility', 'visible');
      })();
    </script>

  <body>
    <div id="root"></div>
